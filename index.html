function podeAcessar(u, aba) {
  if (!u) return false;
  if (u.perfil === "pastor" || u.perfil === "secretaria") return true;
  return (u.acessos || []).includes(aba);
}




function aniversariantesDoMes(membros, mes = mesAtual) {
  return membros.filter(m => {
    if (!m.nascimento) return false;
    return new Date(m.nascimento + "T00:00:00").getMonth() + 1 === mes;
  });
}

function gerarWhatsApp(pastorTel, membros, congMap) {
  if (!membros.length) return;
  const lista = membros.map(m => {
    const dia = new Date(m.nascimento + "T00:00:00").getDate();
    return `• ${m.nome} — dia ${dia} (${congMap[m.congregacaoId] || ""})`;
  }).join("\n");
  const texto = encodeURIComponent(`🎂 *Aniversariantes do Mês — OBPC TAVARES*\n\n${lista}\n\n_Amor que Conecta_ 🙏`);
  const tel = (pastorTel || "").replace(/\D/g, "");
  window.open(`https://wa.me/${tel ? "55" + tel : ""}?text=${texto}`, "_blank");
}

function Login({ usuarios, onLogin }) {
  const [selecionado, setSelecionado] = useState(null);
  const [senha, setSenha] = useState("");
  const [erro, setErro] = useState("");

  const handle = () => {
    if (!selecionado) { setErro("Selecione um usuário."); return; }
    const u = usuarios.find(u => u.id === selecionado.id && u.senha === senha);
    u ? onLogin(u) : setErro("Senha incorreta.");
  };

  const pastores = usuarios.filter(u => u.perfil === "pastor");
  const secretarias = usuarios.filter(u => u.perfil === "secretaria");
  const lideres = usuarios.filter(u => u.perfil === "lider");

  const UserCard = ({ u }) => {
    const ativo = selecionado?.id === u.id;
    return (
      <button onClick={() => { setSelecionado(u); setErro(""); setSenha(""); }}
        className={`w-full flex items-center gap-3 px-4 py-3 rounded-2xl border-2 transition-all text-left ${ativo ? "border-white bg-white/20 shadow-lg scale-[1.02]" : "border-white/10 bg-white/5 hover:bg-white/10 hover:border-white/20"}`}>
        <div className={`w-10 h-10 rounded-full bg-gradient-to-br ${PERFIL_CORES[u.perfil]} flex items-center justify-center text-white font-black text-base flex-shrink-0 shadow`}>
          {u.nome.split(" ")[0][0]}{u.nome.split(" ")[1]?.[0] || ""}
        </div>
        <div className="flex-1 min-w-0">
          <p className="text-white font-bold text-sm truncate">{u.nome}</p>
          <p className="text-rose-300 text-xs">{PERFIS[u.perfil]} {PERFIL_ICONS[u.perfil]}</p>
        </div>
        {ativo && <span className="text-white text-lg">✓</span>}
      </button>
    );
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-4" style={{background:"linear-gradient(135deg,#7f1d1d 0%,#991b1b 40%,#b91c1c 70%,#dc2626 100%)"}}>

                  onKeyDown={e => e.key === "Enter" && handle()}
                  className="mt-1 w-full bg-white/10 border border-white/20 rounded-xl px-4 py-2.5 text-white placeholder-rose-300 focus:outline-none focus:ring-2 focus:ring-white/40 text-sm"
                  placeholder="Digite sua senha" type="password" autoFocus />

            {selecionado ? `Entrar como ${selecionado.nome.split(" ")[0]}` : "Selecione um perfil acima"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── MEMBROS ─────────────────────────────────────────────────────────────────
function Membros({ data, setData, usuario }) {
  const { membros, congregacoes, departamentos } = data;
  const [filtroCong, setFiltroCong] = useState("todos");
  const [filtroStatus, setFiltroStatus] = useState("todos");
  const [busca, setBusca] = useState("");
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ nome:"", nascimento:"", congregacaoId:congregacoes[0]?.id||"", status:"ativo", batizado:false, telefone:"", cargo:"", departamentos:[], email:"", rua:"", numero:"", bairro:"", cidade:"", estado:"RS", cep:"", observacoes:"" });
  const [editId, setEditId] = useState(null);
  const congMap = Object.fromEntries(congregacoes.map(c=>[c.id,c.nome]));
  const depMap = Object.fromEntries(departamentos.map(d=>[d.id,d.nome]));
  const congAllowed = usuario.perfil==="lider" ? [usuario.congregacaoId] : congregacoes.map(c=>c.id);
  const lista = membros.filter(m =>
    congAllowed.includes(m.congregacaoId) &&
    (filtroCong==="todos"||m.congregacaoId===filtroCong) &&
    (filtroStatus==="todos"||m.status===filtroStatus) &&
    m.nome.toLowerCase().includes(busca.toLowerCase())
  );
  const abrirNovo = () => { setForm({nome:"",nascimento:"",congregacaoId:congregacoes[0]?.id||"",status:"ativo",batizado:false,telefone:"",cargo:"",departamentos:[],email:"",rua:"",numero:"",bairro:"",cidade:"",estado:"RS",cep:"",observacoes:""}); setEditId(null); setModal(true); };
  const abrirEdit = m => { setForm({...m}); setEditId(m.id); setModal(true); };
  const salvar = () => {
    if(!form.nome) return;
    setData(prev => {
      const mems = editId ? prev.membros.map(m=>m.id===editId?{...form,id:editId}:m) : [...prev.membros,{...form,id:"m"+Date.now()}];
      return {...prev,membros:mems};
    });
    setModal(false);
  };
  const excluir = id => { if(!confirm("Excluir membro?")) return; setData(prev=>({...prev,membros:prev.membros.filter(m=>m.id!==id)})); };
  const toggleDep = d => setForm(f=>({...f,departamentos:f.departamentos.includes(d)?f.departamentos.filter(x=>x!==d):[...f.departamentos,d]}));
  return (
    <div className="space-y-4">
      <div className="flex flex-wrap gap-2 items-center justify-between">
        <h2 className="text-xl font-black text-gray-800">👥 Membros</h2>
        <Btn onClick={abrirNovo}>+ Novo Membro</Btn>
      </div>
      <div className="flex flex-wrap gap-2">
        <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar..." className="border border-gray-200 rounded-xl px-3 py-2 text-sm w-44 bg-gray-50 focus:outline-none focus:ring-2 focus:ring-rose-200"/>
        <select value={filtroCong} onChange={e=>setFiltroCong(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none">
          <option value="todos">Todas</option>
          {congregacoes.filter(c=>congAllowed.includes(c.id)).map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none">
          <option value="todos">Todos status</option>
          <option value="ativo">Ativos</option>
          <option value="alca">Alça de Mira</option>
        </select>
      </div>
      <div className="grid gap-3">
        {lista.map(m => {
          const nasc = m.nascimento ? new Date(m.nascimento+"T00:00:00") : null;
          const idade = nasc ? hoje.getFullYear()-nasc.getFullYear() : null;
          return (
            <Card key={m.id} className="flex items-start gap-4">
              <div className="w-10 h-10 rounded-full bg-rose-100 flex items-center justify-center text-rose-600 font-black text-lg flex-shrink-0">{m.nome[0]}</div>
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-1">
                  <span className="font-bold text-gray-800">{m.nome}</span>
                  <Badge color={m.status==="ativo"?"green":"yellow"}>{STATUS_LABELS[m.status]}</Badge>
                  {m.batizado ? <Badge color="blue">Batizado</Badge> : <Badge color="purple">Aguardando batismo</Badge>}
                </div>
                <div className="text-xs text-gray-400">{congMap[m.congregacaoId]}{idade?` · ${idade} anos`:""}{m.cargo?` · ${m.cargo}`:""}{m.telefone?` · 📱 ${m.telefone}`:""}{m.email?` · ✉️ ${m.email}`:""}</div>
                {(m.rua||m.cidade) && <div className="text-xs text-gray-400">📍 {[m.rua,m.numero,m.bairro,m.cidade,m.estado].filter(Boolean).join(", ")}</div>}
                {m.departamentos?.length>0 && <div className="flex flex-wrap gap-1 mt-1">{m.departamentos.map(d=><Badge key={d} color="gray">{depMap[d]||d}</Badge>)}</div>}
              </div>
              <div className="flex gap-1 flex-shrink-0">
                <Btn variant="secondary" onClick={()=>abrirEdit(m)}>✏️</Btn>
                <Btn variant="danger" onClick={()=>excluir(m.id)}>🗑️</Btn>
              </div>
            </Card>
          );
        })}
        {lista.length===0 && <p className="text-center text-gray-400 py-8">Nenhum membro encontrado.</p>}
      </div>
      <Modal open={modal} onClose={()=>setModal(false)} title={editId?"Editar Membro":"Novo Membro"}>
        <div className="space-y-3">
          <p className="text-xs font-bold text-rose-600 uppercase tracking-wide">Dados Pessoais</p>
          <Input label="Nome completo" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} />
          <Input label="Data de nascimento" type="date" value={form.nascimento} onChange={e=>setForm({...form,nascimento:e.target.value})} />
          <div className="grid grid-cols-2 gap-3">
            <Input label="Telefone/WhatsApp" value={form.telefone} onChange={e=>setForm({...form,telefone:e.target.value})} placeholder="51999990000" />
            <Input label="E-mail" type="email" value={form.email||""} onChange={e=>setForm({...form,email:e.target.value})} placeholder="email@exemplo.com" />
          </div>

          <p className="text-xs font-bold text-rose-600 uppercase tracking-wide pt-1">Endereço</p>
          <div className="grid grid-cols-3 gap-3">
            <div className="col-span-2">
              <Input label="Rua / Avenida" value={form.rua||""} onChange={e=>setForm({...form,rua:e.target.value})} placeholder="Rua das Flores" />
            </div>
            <Input label="Número" value={form.numero||""} onChange={e=>setForm({...form,numero:e.target.value})} placeholder="123" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Bairro" value={form.bairro||""} onChange={e=>setForm({...form,bairro:e.target.value})} placeholder="Centro" />
            <Input label="CEP" value={form.cep||""} onChange={e=>setForm({...form,cep:e.target.value})} placeholder="96000-000" />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Cidade" value={form.cidade||""} onChange={e=>setForm({...form,cidade:e.target.value})} placeholder="Tavares" />
            <Input label="Estado" value={form.estado||"RS"} onChange={e=>setForm({...form,estado:e.target.value})} placeholder="RS" />
          </div>

          <p className="text-xs font-bold text-rose-600 uppercase tracking-wide pt-1">Igreja</p>
          <Input label="Cargo/Função" value={form.cargo} onChange={e=>setForm({...form,cargo:e.target.value})} placeholder="Presbítero, Diácono, Líder..." />
          <Sel label="Congregação" value={form.congregacaoId} onChange={e=>setForm({...form,congregacaoId:e.target.value})}>
            {congregacoes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}
          </Sel>
          <Sel label="Status" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
            <option value="ativo">Ativo</option>
            <option value="alca">Na Alça de Mira (candidato ao batismo)</option>
          </Sel>
          <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked={form.batizado} onChange={e=>setForm({...form,batizado:e.target.checked})} /> Já foi batizado
          </label>
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Departamentos</label>
            <div className="mt-2 flex flex-wrap gap-2">
              {departamentos.map(d => (
                <button key={d.id} onClick={()=>toggleDep(d.id)}
                  className={`px-3 py-1 rounded-full text-xs font-semibold transition-all ${form.departamentos.includes(d.id)?"bg-rose-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  {d.nome}
                </button>
              ))}
            </div>
          </div>

          <p className="text-xs font-bold text-rose-600 uppercase tracking-wide pt-1">Observações</p>
          <div className="flex flex-col gap-1">
            <textarea value={form.observacoes||""} onChange={e=>setForm({...form,observacoes:e.target.value})}
              className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-rose-300 min-h-[60px] resize-none"
              placeholder="Informações adicionais, necessidades, pedidos de oração..." />
          </div>

          <div className="flex gap-2 pt-2">
            <Btn onClick={salvar} className="flex-1">Salvar</Btn>
            <Btn variant="secondary" onClick={()=>setModal(false)} className="flex-1">Cancelar</Btn>
          </div>
        </div>
      </Modal>
    </div>
  );
}

// ─── ANIVERSARIANTES ─────────────────────────────────────────────────────────
function Aniversariantes({ data }) {
  const { membros, congregacoes, usuarios } = data;
  const [mes, setMes] = useState(mesAtual);
  const congMap = Object.fromEntries(congregacoes.map(c=>[c.id,c.nome]));
  const pastor = usuarios.find(u=>u.perfil==="pastor");
  const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  const lista = aniversariantesDoMes(membros,mes).sort((a,b)=>{
    return new Date(a.nascimento+"T00:00:00").getDate()-new Date(b.nascimento+"T00:00:00").getDate();
  });
  return (
    <div className="space-y-4">
      <div className="flex flex-wrap gap-2 items-center justify-between">
        <h2 className="text-xl font-black text-gray-800">🎂 Aniversariantes</h2>
        <Btn variant="whatsapp" onClick={()=>gerarWhatsApp(pastor?.telefone,lista,congMap)}>📲 WhatsApp ao Pastor</Btn>
      </div>
      <div className="flex flex-wrap gap-2">
        {meses.map((m,i) => (
          <button key={i} onClick={()=>setMes(i+1)}
            className={`px-3 py-1.5 rounded-full text-sm font-semibold transition-all ${mes===i+1?"bg-rose-600 text-white":"bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
            {m}
          </button>
        ))}
      </div>
      <div className="grid gap-3">
        {lista.map(m => {
          const d = new Date(m.nascimento+"T00:00:00");
          const dia = d.getDate();
          const hojeAniv = hoje.getDate()===dia && hoje.getMonth()+1===mes;
          return (
            <Card key={m.id} className={hojeAniv?"border-pink-300 bg-pink-50":""}>
              <div className="flex items-center gap-3">
                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl font-black flex-shrink-0 ${hojeAniv?"bg-pink-200 text-pink-700":"bg-rose-100 text-rose-600"}`}>{dia}</div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="font-bold text-gray-800">{m.nome}</span>
                    {hojeAniv && <Badge color="red">🎉 Hoje!</Badge>}
                  </div>
                  <div className="text-xs text-gray-400">{congMap[m.congregacaoId]}{m.telefone?` · 📱 ${m.telefone}`:""}</div>
                </div>
                {m.telefone && (
                  <a href={`https://wa.me/55${m.telefone.replace(/\D/g,"")}?text=${encodeURIComponent(`Feliz aniversário, ${m.nome.split(" ")[0]}! 🎂🙏\nAmor que Conecta — OBPC TAVARES`)}`}
                    target="_blank" rel="noopener noreferrer"
                    className="bg-green-100 text-green-700 rounded-xl px-3 py-1.5 text-xs font-bold hover:bg-green-200 transition-all flex-shrink-0">
                    WhatsApp
                  </a>
                )}
              </div>
            </Card>
          );
        })}
        {lista.length===0 && <p className="text-center text-gray-400 py-8">Nenhum aniversariante em {meses[mes-1]}.</p>}
      </div>
    </div>
  );
}


// ─── DEPARTAMENTOS ────────────────────────────────────────────────────────────
function Departamentos({ data, setData }) {
  const { departamentos, membros, congregacoes } = data;
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ nome:"", descricao:"" });
  const [editId, setEditId] = useState(null);
  const congMap = Object.fromEntries(congregacoes.map(c=>[c.id,c.nome]));
  const depSelecionado = sel ? departamentos.find(d=>d.id===sel) : null;
  const membrosDep = sel ? membros.filter(m=>(m.departamentos||[]).includes(sel)) : [];
  const abrirNovo = () => { setForm({nome:"",descricao:""}); setEditId(null); setModal(true); };
  const abrirEdit = d => { setForm({nome:d.nome,descricao:d.descricao}); setEditId(d.id); setModal(true); };
  const salvar = () => {
    if(!form.nome) return;
    setData(prev=>{

// ─── HTs (PEQUENOS GRUPOS) ────────────────────────────────────────────────────
function HTs({ data, setData }) {
  const { hts, membros, congregacoes } = data;
  const [sel, setSel] = useState(null);
  const [modal, setModal] = useState(false);
  const [addMemModal, setAddMemModal] = useState(false);
  const [memParaAdd, setMemParaAdd] = useState("");
  const [form, setForm] = useState({ nome:"", congregacaoId:congregacoes[0]?.id||"", liderId:"", dia:"Quarta", horario:"19:30", local:"", membros:[] });
  const [editId, setEditId] = useState(null);
  const congMap = Object.fromEntries(congregacoes.map(c=>[c.id,c.nome]));
  const memMap = Object.fromEntries(membros.map(m=>[m.id,m.nome]));
  const DIAS = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
  const htSel = sel ? hts.find(h=>h.id===sel) : null;
  const membrosSel = htSel ? (htSel.membros||[]).map(id=>membros.find(m=>m.id===id)).filter(Boolean) : [];

  const abrirNovo = () => { setForm({nome:"",congregacaoId:congregacoes[0]?.id||"",liderId:"",dia:"Quarta",horario:"19:30",local:"",membros:[]}); setEditId(null); setModal(true); };
  const abrirEdit = h => { setForm({...h}); setEditId(h.id); setModal(true); };
  const salvar = () => {
    if(!form.nome) return;
    setData(prev=>{
      const list = editId ? prev.hts.map(h=>h.id===editId?{...form,id:editId}:h) : [...prev.hts,{...form,id:"ht"+Date.now()}];
      return {...prev,hts:list};
    });
    setModal(false);
  };
  const excluir = id => { if(!confirm("Excluir HT?")) return; setData(prev=>({...prev,hts:prev.hts.filter(h=>h.id!==id)})); setSel(null); };
  const removerMembro = (htId, memId) => {
    setData(prev=>({...prev,hts:prev.hts.map(h=>h.id===htId?{...h,membros:(h.membros||[]).filter(m=>m!==memId)}:h)}));
  };
  const adicionarMembro = () => {
    if(!memParaAdd||!sel) return;
    setData(prev=>({...prev,hts:prev.hts.map(h=>h.id===sel&&!(h.membros||[]).includes(memParaAdd)?{...h,membros:[...(h.membros||[]),memParaAdd]}:h)}));
    setMemParaAdd(""); setAddMemModal(false);
  };
  const toggleMemForm = id => setForm(f=>({...f,membros:f.membros.includes(id)?f.membros.filter(x=>x!==id):[...f.membros,id]}));

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-black text-gray-800">🏘️ HTs — Pequenos Grupos</h2>
        <Btn onClick={abrirNovo}>+ Novo HT</Btn>
      </div>
      <div className="grid md:grid-cols-2 gap-4">
        <div className="space-y-3">
          {hts.map(h => {
            const lider = membros.find(m=>m.id===h.liderId);
            return (
              <Card key={h.id} className={`cursor-pointer transition-all hover:shadow-md ${sel===h.id?"border-teal-400 bg-teal-50":""}`}>
                <div onClick={()=>setSel(sel===h.id?null:h.id)}>
                  <div className="flex items-start justify-between mb-2">
                    <div>
                      <h3 className="font-black text-gray-800">{h.nome}</h3>
                      <p className="text-xs text-gray-500">{congMap[h.congregacaoId]} · {h.dia} às {h.horario}</p>
                      {h.local && <p className="text-xs text-gray-400">📍 {h.local}</p>}
                    </div>
                    <div className="flex gap-1" onClick={e=>e.stopPropagation()}>
                      <Btn variant="secondary" onClick={()=>abrirEdit(h)}>✏️</Btn>
                      <Btn variant="danger" onClick={()=>excluir(h.id)}>🗑️</Btn>
                    </div>
                  </div>
                  <div className="flex items-center justify-between">
                    <div className="flex items-center gap-2">
                      <span className="text-xs bg-teal-100 text-teal-700 px-2 py-0.5 rounded-full font-semibold">👤 Líder: {lider?.nome?.split(" ")[0] || "—"}</span>
                    </div>
                    <span className="text-xs text-gray-400">{(h.membros||[]).length} membro(s)</span>
                  </div>
                </div>
              </Card>
            );
          })}
          {hts.length===0 && <p className="text-center text-gray-400 py-8">Nenhum HT cadastrado.</p>}
        </div>

        {htSel && (
          <Card>
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-black text-gray-800">👥 {htSel.nome}</h3>
              <Btn variant="outline" onClick={()=>setAddMemModal(true)}>+ Membro</Btn>
            </div>
            <div className="space-y-2">
              {membrosSel.length===0 && <p className="text-gray-400 text-sm text-center py-4">Nenhum membro vinculado.</p>}
              {membrosSel.map(m => (
                <div key={m.id} className="flex items-center gap-2 p-2 bg-gray-50 rounded-xl">
                  <div className="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center text-teal-700 font-black text-sm flex-shrink-0">{m.nome[0]}</div>
                  <div className="flex-1 min-w-0">
                    <p className="text-sm font-semibold text-gray-800 truncate">{m.nome}</p>
                    <p className="text-xs text-gray-400">{congMap[m.congregacaoId]}{m.cargo?` · ${m.cargo}`:""}</p>
                  </div>
                  {m.id===htSel.liderId && <Badge color="blue">Líder</Badge>}
                  <button onClick={()=>removerMembro(htSel.id,m.id)} className="text-xs text-red-400 hover:text-red-600 ml-1">✕</button>
                </div>
              ))}
            </div>
          </Card>
        )}
      </div>

      <Modal open={addMemModal} onClose={()=>setAddMemModal(false)} title="Adicionar membro ao HT">
        <div className="space-y-3">
          <Sel label="Membro" value={memParaAdd} onChange={e=>setMemParaAdd(e.target.value)}>
            <option value="">Selecione...</option>
            {membros.filter(m=>!(htSel?.membros||[]).includes(m.id)).map(m=><option key={m.id} value={m.id}>{m.nome} ({congMap[m.congregacaoId]})</option>)}
          </Sel>
          <div className="flex gap-2 pt-2"><Btn onClick={adicionarMembro} className="flex-1">Adicionar</Btn><Btn variant="secondary" onClick={()=>setAddMemModal(false)} className="flex-1">Cancelar</Btn></div>
        </div>
      </Modal>

      <Modal open={modal} onClose={()=>setModal(false)} title={editId?"Editar HT":"Novo HT"}>
        <div className="space-y-3">
          <Input label="Nome do HT" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="HT Casa da Paz..." />
          <Sel label="Congregação" value={form.congregacaoId} onChange={e=>setForm({...form,congregacaoId:e.target.value})}>{congregacoes.map(c=><option key={c.id} value={c.id}>{c.nome}</option>)}</Sel>
          <Sel label="Líder" value={form.liderId} onChange={e=>setForm({...form,liderId:e.target.value})}>
            <option value="">Selecione o líder...</option>
            {membros.map(m=><option key={m.id} value={m.id}>{m.nome}</option>)}
          </Sel>
          <div className="grid grid-cols-2 gap-3">
            <Sel label="Dia da semana" value={form.dia} onChange={e=>setForm({...form,dia:e.target.value})}>{DIAS.map(d=><option key={d} value={d}>{d}</option>)}</Sel>
            <Input label="Horário" type="time" value={form.horario} onChange={e=>setForm({...form,horario:e.target.value})} />
          </div>
          <Input label="Local / Endereço" value={form.local} onChange={e=>setForm({...form,local:e.target.value})} placeholder="Rua, número..." />
          <div>
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Membros do HT</label>
            <div className="mt-2 max-h-40 overflow-y-auto space-y-1">
              {membros.map(m=>(
                <label key={m.id} className="flex items-center gap-2 p-2 rounded-lg hover:bg-gray-50 cursor-pointer text-sm">
                  <input type="checkbox" checked={form.membros.includes(m.id)} onChange={()=>toggleMemForm(m.id)} />
                  <span>{m.nome} <span className="text-gray-400 text-xs">({congMap[m.congregacaoId]})</span></span>
                </label>
              ))}
            </div>
          </div>
          <div className="flex gap-2 pt-2"><Btn onClick={salvar} className="flex-1">Salvar</Btn><Btn variant="secondary" onClick={()=>setModal(false)} className="flex-1">Cancelar</Btn></div>
        </div>
      </Modal>
    </div>
  );
}

// ─── DATAS COMEMORATIVAS ──────────────────────────────────────────────────────
function DatasComemorativas({ data, setData }) {
  const { datas } = data;
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({ nome:"", data:"", tipo:"personalizado", recorrente:false, descricao:"", congregacaoId:"" });
  const [editId, setEditId] = useState(null);
  const abrirNovo = () => { setForm({nome:"",data:"",tipo:"personalizado",recorrente:false,descricao:"",congregacaoId:""}); setEditId(null); setModal(true); };
  const abrirEdit = d => { setForm({...d}); setEditId(d.id); setModal(true); };
  const salvar = () => {
    if(!form.nome||!form.data) return;
    setData(prev=>{
      const list = editId ? prev.datas.map(d=>d.id===editId?{...form,id:editId}:d) : [...prev.datas,{...form,id:"dt"+Date.now()}];
      return {...prev,datas:list};
    });
    setModal(false);
  };
  const excluir = id => { if(!confirm("Excluir data?")) return; setData(prev=>({...prev,datas:prev.datas.filter(d=>d.id!==id)})); };

  const sorted = [...datas].sort((a,b)=>a.data.localeCompare(b.data));
  const proximas = sorted.filter(d=>d.data>=hoje.toISOString().split("T")[0]).slice(0,3);

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-black text-gray-800">📅 Datas Comemorativas</h2>
        <Btn onClick={abrirNovo}>+ Nova Data</Btn>
      </div>

      {proximas.length>0 && (
        <div className="bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl p-4 text-white">
          <p className="font-bold text-sm mb-2">🔔 Próximas datas</p>
          <div className="flex flex-wrap gap-2">
            {proximas.map(d=>{
              const dt = new Date(d.data+"T00:00:00");
              const diff = Math.ceil((dt-hoje)/(1000*60*60*24));
              return (
                <div key={d.id} className="bg-white/20 rounded-xl px-3 py-1.5 text-sm">
                  📌 {d.nome} — {diff===0?"hoje":`em ${diff} dia(s)`}
                </div>
              );
            })}
          </div>
        </div>
      )}

      <div className="grid gap-3">
        {sorted.map(d => {
          const dt = new Date(d.data+"T00:00:00");
          const passado = d.data < hoje.toISOString().split("T")[0];
          return (
            <Card key={d.id} className={passado?"opacity-60":""}>
              <div className="flex items-center gap-4">
                <div className={`w-14 h-14 rounded-2xl flex flex-col items-center justify-center flex-shrink-0 ${d.tipo==="fixo"?"bg-amber-100 text-amber-700":"bg-rose-100 text-rose-600"}`}>
                  <span className="text-lg font-black leading-none">{dt.getDate()}</span>
                  <span className="text-xs font-semibold">{dt.toLocaleString("pt-BR",{month:"short"}).replace(".","")}</span>
                </div>
                <div className="flex-1">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className="font-black text-gray-800">{d.nome}</span>
                    <Badge color={d.tipo==="fixo"?"yellow":"purple"}>{d.tipo==="fixo"?"Fixo":"Personalizado"}</Badge>
                    {d.recorrente && <Badge color="gray">Recorrente</Badge>}
                  </div>
                  {d.descricao && <p className="text-xs text-gray-400 mt-0.5">{d.descricao}</p>}
                </div>
                <div className="flex gap-1 flex-shrink-0">
                  <Btn variant="secondary" onClick={()=>abrirEdit(d)}>✏️</Btn>
                  {d.tipo!=="fixo" && <Btn variant="danger" onClick={()=>excluir(d.id)}>🗑️</Btn>}
                </div>
              </div>
            </Card>
          );
        })}
        {sorted.length===0 && <p className="text-center text-gray-400 py-8">Nenhuma data cadastrada.</p>}
      </div>

      <Modal open={modal} onClose={()=>setModal(false)} title={editId?"Editar Data":"Nova Data Comemorativa"}>
        <div className="space-y-3">
          <Input label="Nome" value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Aniversário da Igreja, Retiro, Culto especial..." />
          <Input label="Data" type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})} />
          <Sel label="Tipo" value={form.tipo} onChange={e=>setForm({...form,tipo:e.target.value})}>
            <option value="fixo">Fixo (tradicional/litúrgico)</option>
            <option value="personalizado">Personalizado (evento da igreja)</option>
          </Sel>
          <Input label="Descrição" value={form.descricao} onChange={e=>setForm({...form,descricao:e.target.value})} placeholder="Descrição opcional..." />
          <label className="flex items-center gap-2 text-sm text-gray-600 cursor-pointer">
            <input type="checkbox" checked={form.recorrente} onChange={e=>setForm({...form,recorrente:e.target.checked})} /> Data recorrente (todo ano)
          </label>
          <div className="flex gap-2 pt-2"><Btn onClick={salvar} className="flex-1">Salvar</Btn><Btn variant="secondary" onClick={()=>setModal(false)} className="flex-1">Cancelar</Btn></div>
        </div>
      </Modal>
    </div>
  );
}

// ─── AGENDA DE MÍDIAS ─────────────────────────────────────────────────────────
const REDES = ["Instagram","Facebook","WhatsApp","YouTube","TikTok","Twitter/X","Telegram"];
const STATUS_AGENDA = { rascunho:"Rascunho", agendado:"Agendado", publicado:"Publicado" };
const STATUS_CORES = { rascunho:"gray", agendado:"blue", publicado:"green" };

function AgendaMidias({ data, setData }) {
  const { agenda } = data;
  const [modal, setModal] = useState(false);
  const [filtroRede, setFiltroRede] = useState("todas");
  const [filtroStatus, setFiltroStatus] = useState("todos");
  const [form, setForm] = useState({ titulo:"", rede:"Instagram", data:new Date().toISOString().split("T")[0], horario:"09:00", texto:"", status:"rascunho", imagem:"" });
  const [editId, setEditId] = useState(null);
  const [preview, setPreview] = useState(null);

  const lista = [...agenda]
    .filter(a=>(filtroRede==="todas"||a.rede===filtroRede)&&(filtroStatus==="todos"||a.status===filtroStatus))
    .sort((a,b)=>a.data.localeCompare(b.data)||a.horario.localeCompare(b.horario));

  const abrirNovo = () => { setForm({titulo:"",rede:"Instagram",data:new Date().toISOString().split("T")[0],horario:"09:00",texto:"",status:"rascunho",imagem:""}); setEditId(null); setModal(true); };
  const abrirEdit = a => { setForm({...a}); setEditId(a.id); setModal(true); };
  const salvar = () => {
    if(!form.titulo||!form.data) return;
    setData(prev=>{
      const list = editId ? prev.agenda.map(a=>a.id===editId?{...form,id:editId}:a) : [...prev.agenda,{...form,id:"ag"+Date.now()}];
      return {...prev,agenda:list};
    });
    setModal(false);
  };
  const excluir = id => { if(!confirm("Excluir postagem?")) return; setData(prev=>({...prev,agenda:prev.agenda.filter(a=>a.id!==id)})); };
  const mudarStatus = (id, status) => setData(prev=>({...prev,agenda:prev.agenda.map(a=>a.id===id?{...a,status}:a)}));

  const handleImg = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(f=>({...f,imagem:ev.target.result}));
    reader.readAsDataURL(file);
  };

  const REDE_ICONS = { Instagram:"📸", Facebook:"👍", WhatsApp:"💬", YouTube:"▶️", TikTok:"🎵", "Twitter/X":"🐦", Telegram:"✈️" };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="text-xl font-black text-gray-800">📱 Agenda de Mídias</h2>
        <Btn onClick={abrirNovo}>+ Nova Postagem</Btn>
      </div>

      <div className="flex flex-wrap gap-2">
        <select value={filtroRede} onChange={e=>setFiltroRede(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none">
          <option value="todas">Todas as redes</option>
          {REDES.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <select value={filtroStatus} onChange={e=>setFiltroStatus(e.target.value)} className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none">
          <option value="todos">Todos os status</option>
          {Object.entries(STATUS_AGENDA).map(([k,v])=><option key={k} value={k}>{v}</option>)}
        </select>
      </div>

      <div className="grid gap-3">
        {lista.map(a => (
          <Card key={a.id}>
            <div className="flex items-start gap-3">
              <div className="w-10 h-10 rounded-xl bg-sky-100 flex items-center justify-center text-xl flex-shrink-0">
                {REDE_ICONS[a.rede]||"📣"}
              </div>
              <div className="flex-1 min-w-0">
                <div className="flex flex-wrap items-center gap-2 mb-1">
                  <span className="font-black text-gray-800">{a.titulo}</span>
                  <Badge color={STATUS_CORES[a.status]}>{STATUS_AGENDA[a.status]}</Badge>
                  <Badge color="gray">{a.rede}</Badge>
                </div>
                <p className="text-xs text-gray-400 mb-1">📅 {new Date(a.data+"T00:00:00").toLocaleDateString("pt-BR")} às {a.horario}</p>
                {a.texto && <p className="text-xs text-gray-600 bg-gray-50 rounded-lg px-3 py-2 line-clamp-2">{a.texto}</p>}
                {a.imagem && <button onClick={()=>setPreview(a.imagem)} className="mt-1 text-xs text-sky-600 hover:underline">🖼️ Ver imagem</button>}
              </div>
              <div className="flex flex-col gap-1 flex-shrink-0">
                <select value={a.status} onChange={e=>mudarStatus(a.id,e.target.value)}
                  className="text-xs border border-gray-200 rounded-lg px-2 py-1 bg-gray-50 focus:outline-none">
                  {Object.entries(STATUS_AGENDA).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
                <div className="flex gap-1">
                  <Btn variant="secondary" onClick={()=>abrirEdit(a)}>✏️</Btn>
                  <Btn variant="danger" onClick={()=>excluir(a.id)}>🗑️</Btn>
                </div>
              </div>
            </div>
          </Card>
        ))}
        {lista.length===0 && <p className="text-center text-gray-400 py-8">Nenhuma postagem encontrada.</p>}
      </div>

      {preview && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4" onClick={()=>setPreview(null)}>
          <img src={preview} alt="preview" className="max-w-full max-h-[80vh] rounded-2xl shadow-2xl" />
        </div>
      )}

      <Modal open={modal} onClose={()=>setModal(false)} title={editId?"Editar Postagem":"Nova Postagem"}>
        <div className="space-y-3">
          <Input label="Título" value={form.titulo} onChange={e=>setForm({...form,titulo:e.target.value})} placeholder="Culto domingo, versículo da semana..." />
          <Sel label="Rede Social" value={form.rede} onChange={e=>setForm({...form,rede:e.target.value})}>
            {REDES.map(r=><option key={r} value={r}>{REDE_ICONS[r]||""} {r}</option>)}
          </Sel>
          <div className="grid grid-cols-2 gap-3">
            <Input label="Data" type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})} />
            <Input label="Horário" type="time" value={form.horario} onChange={e=>setForm({...form,horario:e.target.value})} />
          </div>
          <div className="flex flex-col gap-1">
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Texto / Legenda</label>
            <textarea value={form.texto} onChange={e=>setForm({...form,texto:e.target.value})}
              className="border border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:outline-none focus:ring-2 focus:ring-rose-300 min-h-[80px] resize-none"
              placeholder="Texto da postagem, hashtags..." />
          </div>
          <Sel label="Status" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
            {Object.entries(STATUS_AGENDA).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </Sel>
          <div className="flex flex-col gap-1">
            <label className="text-xs font-semibold text-gray-500 uppercase tracking-wide">Imagem / Arquivo</label>
            <input type="file" accept="image/*" onChange={handleImg} className="text-sm text-gray-600 file:mr-3 file:py-1 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-rose-100 file:text-rose-700 hover:file:bg-rose-200" />
            {form.imagem && <img src={form.imagem} alt="preview" className="mt-2 rounded-xl max-h-32 object-cover" />}
          </div>
          <div className="flex gap-2 pt-2"><Btn onClick={salvar} className="flex-1">Salvar</Btn><Btn variant="secondary" onClick={()=>setModal(false)} className="flex-1">Cancelar</Btn></div>
        </div>
      </Modal>
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
const ABAS = [
  { id:"dashboard", label:"Início", icon:"🏠" },
  { id:"membros", label:"Membros", icon:"👥" },
  { id:"aniversariantes", label:"Aniversários", icon:"🎂" },
  { id:"hts", label:"HTs", icon:"🏘️" },
  { id:"departamentos", label:"Departamentos", icon:"🏛️" },
  { id:"datas", label:"Datas", icon:"📅" },
  { id:"agenda", label:"Mídias", icon:"📱" },
  { id:"congregacoes", label:"Congregações", icon:"⛪" },
  { id:"usuarios", label:"Usuários", icon:"👤" },
];

export default function App() {
  const [data, setDataRaw] = useState(null);
  const [carregando, setCarregando] = useState(true);
  const [usuario, setUsuario] = useState(null);
  const [aba, setAba] = useState("dashboard");

  // Carrega dados do storage compartilhado na inicialização
  useEffect(() => {
    loadShared().then(saved => {
      if (saved && saved.hts && saved.datas && saved.agenda) {
        setDataRaw(saved);
      } else {
        setDataRaw(SEED);
        saveShared(SEED);
      }
      setCarregando(false);
    });
  }, []);

  const setData = fn => {
    setDataRaw(prev => {
      const next = typeof fn === "function" ? fn(prev) : fn;
      saveShared(next);
      return next;
    });
  };

  useEffect(() => {
    if (usuario && data) {
      const u = data.usuarios.find(u => u.id === usuario.id);
      if (u) setUsuario(u);
    }
  }, [data?.usuarios]);

  if (carregando) return (
    <div className="min-h-screen flex items-center justify-center" style={{background:"linear-gradient(135deg,#7f1d1d,#b91c1c)"}}>
      <div className="text-center text-white">
        <div className="text-5xl mb-4 animate-pulse">⛪</div>
        <p className="font-bold text-lg" style={{fontFamily:"Georgia,serif"}}>OBPC TAVARES</p>
        <p className="text-rose-200 text-sm mt-1">Carregando dados...</p>
      </div>
    </div>
  );

  if (!usuario) return <Login usuarios={data.usuarios} onLogin={setUsuario} />;
  const abasVisiveis = ABAS.filter(a => {
    if(a.id==="dashboard") return true;
    if(a.id==="usuarios"||a.id==="congregacoes") return usuario.perfil==="pastor"||usuario.perfil==="secretaria";
    if(["hts","datas","agenda"].includes(a.id)) return usuario.perfil==="pastor"||usuario.perfil==="secretaria"||(usuario.acessos||[]).includes(a.id);
    return podeAcessar(usuario, a.id);
  });
  return (
    <div className="min-h-screen bg-gray-50 flex flex-col">
      <header className="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
        <div className="max-w-5xl mx-auto px-4 py-2.5 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <img src={LOGO_COLORIDA} alt="OBPC" className="w-8 h-8 object-contain" />
            <div>
              <h1 className="font-black text-gray-800 text-sm leading-tight" style={{fontFamily:"Georgia,serif"}}>OBPC TAVARES</h1>
              <p className="text-xs text-rose-500 italic leading-tight">Amor que Conecta</p>
            </div>
          </div>
          <div className="flex items-center gap-3">
            <span className="text-xs text-gray-500 hidden sm:block">{usuario.nome} · {PERFIS[usuario.perfil]}</span>
            <button onClick={()=>setUsuario(null)} className="text-xs text-gray-400 hover:text-gray-600 font-semibold">Sair</button>
          </div>
        </div>
        <div className="max-w-5xl mx-auto px-4 flex gap-0.5 overflow-x-auto">
          {abasVisiveis.map(a => (
            <button key={a.id} onClick={()=>setAba(a.id)}
              className={`flex items-center gap-1 px-3 py-2 text-xs font-bold whitespace-nowrap border-b-2 transition-all ${aba===a.id?"border-rose-600 text-rose-600":"border-transparent text-gray-500 hover:text-gray-800"}`}>
              {a.icon} <span className="hidden sm:inline">{a.label}</span>
            </button>
          ))}
        </div>
      </header>
      <main className="flex-1 max-w-5xl mx-auto w-full px-4 py-6">
        {aba==="dashboard" && <Dashboard data={data} usuario={usuario} setAba={setAba} />}
        {aba==="membros" && podeAcessar(usuario,"membros") && <Membros data={data} setData={setData} usuario={usuario} />}
        {aba==="aniversariantes" && podeAcessar(usuario,"aniversariantes") && <Aniversariantes data={data} />}
        {aba==="departamentos" && podeAcessar(usuario,"departamentos") && <Departamentos data={data} setData={setData} />}
        {aba==="hts" && (usuario.perfil==="pastor"||usuario.perfil==="secretaria"||(usuario.acessos||[]).includes("hts")) && <HTs data={data} setData={setData} />}
        {aba==="datas" && (usuario.perfil==="pastor"||usuario.perfil==="secretaria"||(usuario.acessos||[]).includes("datas")) && <DatasComemorativas data={data} setData={setData} />}
        {aba==="agenda" && (usuario.perfil==="pastor"||usuario.perfil==="secretaria"||(usuario.acessos||[]).includes("agenda")) && <AgendaMidias data={data} setData={setData} />}
        {aba==="congregacoes" && (usuario.perfil==="pastor"||usuario.perfil==="secretaria") && <Congregacoes data={data} setData={setData} />}
        {aba==="usuarios" && (usuario.perfil==="pastor"||usuario.perfil==="secretaria") && <Usuarios data={data} setData={setData} />}
      </main>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
